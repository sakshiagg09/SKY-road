ID: sky-road
_schema-version: "3.1"
version: 1.0.0

modules:
  # --------------------------
  # 1. DB Deployment Module
  # --------------------------
  - name: sky-road-db
    type: hdb
    path: db
    parameters:
      memory: 512M
      disk-quota: 512M
    requires:
      - name: sky-road-hdi-container

  # --------------------------
  # 2. Node.js CAP Service
  # --------------------------
  - name: sky-road-srv
    type: nodejs
    path: srv
    build-parameters:
      builder: npm
    parameters:
      memory: 512M
    requires:
      - name: sky-road-hdi-container

resources:
  # --------------------------
  # HDI Container
  # --------------------------
  - name: sky-road-hdi-container
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
