ID: sky-road
_schema-version: "3.1"
version: 1.0.0

modules:
  # --------------------------
  # 1. DB Deployment Module
  # --------------------------
  - name: sky-road-db
    type: hdb
    path: db
    parameters:
      memory: 512M
      disk-quota: 512M
    requires:
      - name: sky-road-hdi-container

  # --------------------------
  # 2. Node.js CAP Service
  # --------------------------
  - name: sky-road-srv
    type: nodejs
    path: srv
    build-parameters:
      builder: npm
    parameters:
      memory: 512M
    requires:
      - name: sky-road-hdi-container
  - name: sky-road-srv
    type: nodejs
    path: gen/srv
    requires:
      - name: sky-road-auth

resources:
  # --------------------------
  # HDI Container
  # --------------------------
  - name: sky-road-hdi-container
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: sky-road-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: sky-road-${org}-${space}
        tenant-mode: dedicated
description: "A simple CAP project."
parameters:
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
